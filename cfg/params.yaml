dlio:

  frames:
    odom: odom
    baselink: base_link
    lidar: lidar
    imu: imu

  map:
    waitUntilMove: true
    dense:
      filtered: false
    sparse:
      leafSize: 0.25

  odom:

    gravity: 9.80665
    computeTimeOffset: true

    initialPose:
      use: false
      position:
        x: 0.0
        y: 0.0
        z: 0.0
      orientation:
        w: 1.0
        x: 0.0
        y: 0.0
        z: 0.0

    priorMap:
      use: false
      path: /home/vectr/lab.pcd

    imu:
      gravityAlign: false
      calibration:
        gyro: true
        accel: true
        time: 1
      bufferSize: 5000

    preprocessing:
      cropBoxFilter:
        size: 1.0
      voxelFilter:
        res: 0.25

    keyframe:
      threshD: 1.0
      threshR: 45.0

    submap:
      keyframe:
        knn: 10
        kcv: 10
        kcc: 10
    gicp:
      minNumPoints: 64
      kCorrespondences: 16
      maxCorrespondenceDistance: 0.5
      maxIterations: 32
      transformationEpsilon: 0.01
      rotationEpsilon: 0.01
      initLambdaFactor: 1e-9

    geo:
      Kp: 8
      Kv: 12
      Kq: 4.0
      Kab: 6
      Kgb: 1.0
      abias_max: 5.0
      gbias_max: 0.5
